name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Desktop app unit tests ──────────────────────────────────────────────────
  desktop-test:
    name: Desktop — unit tests
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: linux
          target: desktop
          cache: true

      - name: Install build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build libgl-dev

      - name: Configure (tests only — SDL3 skipped)
        run: |
          cmake -S desktop_app -B build/desktop \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_APP=OFF

      - name: Build
        run: cmake --build build/desktop --target desktop_app_tests

      - name: Test
        run: ctest --test-dir build/desktop --output-on-failure

  # ── Full desktop app build (catches compile errors in app code) ─────────────
  desktop-build:
    name: Desktop — full build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: linux
          target: desktop
          modules: qtmultimedia
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build libgl-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols \
            libx11-dev libxext-dev libxi-dev libxrandr-dev \
            libpulse-dev libasound2-dev

      - name: Cache SDL3 (FetchContent)
        uses: actions/cache@v4
        with:
          path: build/desktop-full/_deps
          key: sdl3-ubuntu-${{ hashFiles('desktop_app/CMakeLists.txt') }}

      - name: Configure
        run: |
          cmake -S desktop_app -B build/desktop-full \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/desktop-full

  # ── ESP32 firmware build ────────────────────────────────────────────────────
  esp32-build:
    name: ESP32 — firmware build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.2
          target: esp32
          path: esp32_firmware
          command: idf.py build

  # ── HIL test — Python syntax & import check ─────────────────────────────────
  hil-check:
    name: HIL — Python check
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyserial matplotlib

      - name: Syntax check
        run: python3 -m py_compile esp32_firmware/esp32_fw_hil/src/esp32_fw_hil.py

      - name: Import check
        run: python3 -c "import esp32_firmware.esp32_fw_hil.src.esp32_fw_hil" 2>/dev/null || \
             python3 esp32_firmware/esp32_fw_hil/src/esp32_fw_hil.py --help 2>/dev/null || true
